<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>भुताटकी v2.0</title>
  <style>
    :root {
      --bg: #070b1a;
      --panel: #0f1830;
      --wall: #2d5bff;
      --pellet: #f5f1c8;
      --orb: #fff6a5;
      --player: #ffd84d;
      --danger: #ff5d73;
      --ghost2: #ff96d5;
      --text: #e8efff;
      --good: #7fffb6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #11204a, var(--bg) 55%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }
    .wrap {
      width: min(94vw, 760px);
      padding: 16px;
      background: rgba(6, 10, 24, 0.88);
      border: 1px solid rgba(120, 155, 255, 0.2);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
    }
    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: var(--panel);
      border-radius: 12px;
      font-size: 14px;
    }
    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .pill { color: var(--good); }
    .brand {
      color: #9fc4ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: radial-gradient(circle at center, #0a1230, #050816 65%);
      border-radius: 12px;
      border: 1px solid rgba(120, 155, 255, 0.15);
      image-rendering: pixelated;
      box-shadow: inset 0 0 30px rgba(77, 118, 255, 0.12);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .help {
      margin-top: 10px;
      color: #c1ceff;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls {
      margin-top: 14px;
      display: grid;
      justify-content: center;
      gap: 8px;
    }
    .ctrl-btn {
      width: 72px;
      height: 56px;
      border: 0;
      border-radius: 14px;
      background: #1a2b63;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      touch-action: manipulation;
    }
    .ctrl-btn:active {
      transform: scale(0.96);
      background: #29449b;
    }
    .mobile-note {
      margin-top: 8px;
      text-align: center;
      color: #9fd6ff;
      font-size: 13px;
    }
    .footer-note {
      margin-top: 10px;
      text-align: center;
      color: #9fb2ff;
      font-size: 12px;
    }
    @media (max-width: 640px) {
      .wrap {
        width: 100vw;
        padding: 10px;
        border-radius: 0;
      }
      .hud {
        gap: 8px;
        margin-bottom: 8px;
        padding: 8px 10px;
        font-size: 12px;
      }
      .stats {
        gap: 10px;
      }
      .brand {
        font-size: 10px;
      }
      .help {
        display: none;
      }
      .mobile-note,
      .footer-note {
        font-size: 11px;
      }
    }
    b { color: white; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="stats">
        <div>गुण: <b id="score">0</b></div>
        <div>जीव: <b id="lives">3</b></div>
        <div>गोळे: <b id="pellets">0</b></div>
        <div>शक्ती: <b id="power">0.0से</b></div>
      </div>
      <div>
      <div id="status" class="pill"></div>
        <div class="brand">v2.0 Mobile Tune</div>
      </div>
    </div>
    <canvas id="game" width="480" height="480" tabindex="0"></canvas>
    <div class="help">
      <div><b>हलवा:</b> Arrow keys / WASD</div>
      <div><b>Space:</b> आगगोळा  <b>P:</b> थांबा  <b>R:</b> पुन्हा सुरू</div>
      <div>भुते चुकवा, गोळे खा, आणि आगगोळे फेका.</div>
    </div>
    <div id="mobile-note" class="mobile-note"></div>
  </div>

  <script>
    const TILE = 32;
    const mapTemplate = [
      '###############',
      '#P....#....o..#',
      '#.###.#.###.#.#',
      '#...#...#...#.#',
      '###.#.#.#.###.#',
      '#...#.#.#.....#',
      '#.###.#.#####.#',
      '#.....G.......#',
      '#.#####.#.###.#',
      '#.......#...#.#',
      '#.###.###.#.#.#',
      '#o..#.....#..o#',
      '#.#.#.###.###.#',
      '#...#...G.....#',
      '###############'
    ];

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const startArt = new Image();
    startArt.src = 'bhutatki-start-screen-v2.png';
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const pelletsEl = document.getElementById('pellets');
    const powerEl = document.getElementById('power');
    const statusEl = document.getElementById('status');
    const mobileNoteEl = document.getElementById('mobile-note');

    const dirs = {
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 },
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 }
    };
    const dirList = Object.values(dirs);

    let state;
    let lastTime = 0;
    let audioCtx = null;
    let musicTimers = [];
    let musicStarted = false;
    let touchStart = null;
    let lastTapAt = 0;
    let lastTapPos = null;
    const isMobileLike = window.matchMedia('(pointer: coarse)').matches || /iphone|ipad|android|mobile/i.test(navigator.userAgent);

    function ensureAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioCtx = new Ctx();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'square', volume = 0.04, sweep = null) {
      const ctx = ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (sweep !== null) osc.frequency.linearRampToValueAtTime(sweep, ctx.currentTime + duration);
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    const sounds = {
      pellet: () => playTone(720, 0.05, 'square', 0.025, 840),
      orb: () => { playTone(420, 0.14, 'sawtooth', 0.045, 760); setTimeout(() => playTone(760, 0.12, 'square', 0.03, 980), 35); },
      fire: () => playTone(300, 0.08, 'sawtooth', 0.035, 150),
      hitGhost: () => { playTone(260, 0.12, 'square', 0.04, 520); setTimeout(() => playTone(520, 0.1, 'triangle', 0.025, 760), 30); },
      hurt: () => playTone(210, 0.35, 'sawtooth', 0.05, 90),
      win: () => { [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.16, 'triangle', 0.03, f * 1.08), i * 90)); }
    };

    function clearMusicTimers() {
      musicTimers.forEach((id) => clearTimeout(id));
      musicTimers = [];
    }

    function stopMusic() {
      clearMusicTimers();
      musicStarted = false;
    }

    function startMusic() {
      if (musicStarted) return;
      const ctx = ensureAudio();
      if (!ctx) return;
      musicStarted = true;
      const melody = [262, 330, 392, 330, 294, 349, 440, 349];
      const bass = [131, 147, 165, 147, 131, 147, 165, 196];
      const beatMs = 260;
      let step = 0;

      const schedule = () => {
        if (!musicStarted || !state || state.paused || state.over || state.won || !state.started) return;
        playTone(melody[step % melody.length], 0.18, 'triangle', 0.018, melody[step % melody.length] * 1.02);
        playTone(bass[step % bass.length], 0.22, 'sine', 0.012, bass[step % bass.length] * 0.98);
        step += 1;
        musicTimers.push(setTimeout(schedule, beatMs));
      };

      schedule();
    }

    function spawnBurst(x, y, color, count = 8, speed = 3.2) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.35;
        const vel = speed * (0.5 + Math.random() * 0.8);
        state.particles.push({
          x, y,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel,
          life: 0.45 + Math.random() * 0.2,
          size: 2 + Math.random() * 3,
          color
        });
      }
    }

    function parseMap() {
      const tiles = [];
      const pellets = new Set();
      const orbs = new Set();
      const ghostSpawns = [];
      let playerSpawn = { x: 1, y: 1 };

      for (let y = 0; y < mapTemplate.length; y++) {
        const row = [];
        for (let x = 0; x < mapTemplate[y].length; x++) {
          const ch = mapTemplate[y][x];
          row.push(ch === '#' ? '#' : ' ');
          if (ch === '.' || ch === 'P' || ch === 'G' || ch === 'o') pellets.add(key(x, y));
          if (ch === 'o') orbs.add(key(x, y));
          if (ch === 'P') playerSpawn = { x, y };
          if (ch === 'G') ghostSpawns.push({ x, y });
        }
        tiles.push(row);
      }
      for (const orb of orbs) pellets.delete(orb);
      return { tiles, pellets, orbs, playerSpawn, ghostSpawns };
    }

    function createEntity(tileX, tileY, speed) {
      return {
        x: tileX + 0.5,
        y: tileY + 0.5,
        dir: { x: 0, y: 0 },
        nextDir: { x: 0, y: 0 },
        facing: { x: 1, y: 0 },
        targetX: null,
        targetY: null,
        speed
      };
    }

    function resetGame() {
      const parsed = parseMap();
      state = {
        ...parsed,
        score: 0,
        lives: 3,
        powerTimer: 0,
        won: false,
        over: false,
        started: false,
        paused: false,
        gameStarted: false,
        animTime: 0,
        fireballs: [],
        fireballCooldown: 0,
        particles: [],
        flashTimer: 0,
        player: createEntity(parsed.playerSpawn.x, parsed.playerSpawn.y, 5.2),
        ghosts: parsed.ghostSpawns.map((spawn, i) => ({
          ...createEntity(spawn.x, spawn.y, 3.2 + i * 0.25),
          spawn: { ...spawn },
          lastDecisionTile: null,
          targetX: null,
          targetY: null,
          respawnTimer: 0,
          personality: i === 0 ? 'hunter' : 'ambusher',
          color: i === 0 ? '#ff5d73' : '#ff96d5'
        }))
      };
      stopMusic();
      state.player.dir = { x: 0, y: 0 };
      updateHud();
    }

    function key(x, y) { return `${x},${y}`; }
    function tileAt(x, y) {
      if (y < 0 || y >= state.tiles.length || x < 0 || x >= state.tiles[0].length) return '#';
      return state.tiles[y][x];
    }
    function isWall(x, y) { return tileAt(x, y) === '#'; }
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function tileCenter(v) { return Math.floor(v) + 0.5; }
    function centerAligned(v) { return Math.abs(v - tileCenter(v)) < 0.12; }

    function canOccupy(x, y, radius = 0.22) {
      const left = Math.floor(x - radius);
      const right = Math.floor(x + radius);
      const top = Math.floor(y - radius);
      const bottom = Math.floor(y + radius);
      return !isWall(left, top) && !isWall(right, top) && !isWall(left, bottom) && !isWall(right, bottom);
    }

    function canMove(entity, dir) {
      const step = 0.28;
      return canOccupy(entity.x + dir.x * step, entity.y + dir.y * step);
    }

    function moveEntity(entity, dt) {
      const atCenter = centerAligned(entity.x) && centerAligned(entity.y);
      if (atCenter) {
        entity.x = tileCenter(entity.x);
        entity.y = tileCenter(entity.y);
      }

      if ((entity.nextDir.x || entity.nextDir.y) && atCenter && canMove(entity, entity.nextDir)) {
        entity.dir = { ...entity.nextDir };
        entity.facing = { ...entity.nextDir };
      }

      if (!entity.dir.x && !entity.dir.y) return;
      entity.facing = { ...entity.dir };

      const step = entity.speed * dt;

      if (entity.dir.x !== 0) {
        entity.y = tileCenter(entity.y);
        const nextX = entity.x + entity.dir.x * step;
        if (canOccupy(nextX, entity.y)) {
          entity.x = nextX;
        } else {
          entity.x = tileCenter(entity.x);
          entity.nextDir = { x: 0, y: 0 };
          entity.dir = { x: 0, y: 0 };
        }
      }

      if (entity.dir.y !== 0) {
        entity.x = tileCenter(entity.x);
        const nextY = entity.y + entity.dir.y * step;
        if (canOccupy(entity.x, nextY)) {
          entity.y = nextY;
        } else {
          entity.y = tileCenter(entity.y);
          entity.nextDir = { x: 0, y: 0 };
          entity.dir = { x: 0, y: 0 };
        }
      }
    }

    function tryStartPlayerMove(dir) {
      const player = state.player;
      const tileX = Math.floor(player.x);
      const tileY = Math.floor(player.y);
      const nextTileX = tileX + dir.x;
      const nextTileY = tileY + dir.y;
      if (isWall(nextTileX, nextTileY)) return false;
      if (!state.started) {
        state.started = true;
        state.paused = false;
        startMusic();
      }
      player.dir = { ...dir };
      player.facing = { ...dir };
      player.targetX = nextTileX + 0.5;
      player.targetY = nextTileY + 0.5;
      state.gameStarted = true;
      return true;
    }

    function updatePlayer(dt) {
      const player = state.player;

      if (player.targetX === null || player.targetY === null) {
        player.x = tileCenter(player.x);
        player.y = tileCenter(player.y);
        if ((player.nextDir.x || player.nextDir.y) && tryStartPlayerMove(player.nextDir)) {
          // started queued move
        } else if ((player.dir.x || player.dir.y) && !tryStartPlayerMove(player.dir)) {
          player.dir = { x: 0, y: 0 };
        }
      }

      if (player.targetX !== null && player.targetY !== null) {
        const step = player.speed * dt;
        const dx = player.targetX - player.x;
        const dy = player.targetY - player.y;
        const distance = Math.hypot(dx, dy);
        if (distance <= step) {
          player.x = player.targetX;
          player.y = player.targetY;
          player.targetX = null;
          player.targetY = null;
        } else {
          player.x += (dx / distance) * step;
          player.y += (dy / distance) * step;
        }
      }

      const tx = Math.floor(state.player.x);
      const ty = Math.floor(state.player.y);
      const k = key(tx, ty);

      if (state.pellets.has(k)) {
        state.pellets.delete(k);
        state.score += 10;
        sounds.pellet();
        spawnBurst(state.player.x, state.player.y, '#fff1a8', 4, 1.8);
      }
      if (state.orbs.has(k)) {
        state.orbs.delete(k);
        state.score += 50;
        state.powerTimer = 6;
        sounds.orb();
        spawnBurst(state.player.x, state.player.y, '#fff6a5', 12, 2.8);
        state.flashTimer = 0.18;
      }

      if (state.pellets.size === 0 && state.orbs.size === 0) {
        state.won = true;
        stopMusic();
        sounds.win();
      }
    }

    function chooseGhostDirection(ghost) {
      ghost.x = tileCenter(ghost.x);
      ghost.y = tileCenter(ghost.y);
      const currentTile = key(Math.floor(ghost.x), Math.floor(ghost.y));

      const tileX = Math.floor(ghost.x);
      const tileY = Math.floor(ghost.y);
      const options = dirList.filter(dir => {
        if (dir.x === -ghost.dir.x && dir.y === -ghost.dir.y) return false;
        return !isWall(tileX + dir.x, tileY + dir.y);
      });
      const choices = options.length ? options : dirList.filter(dir => !isWall(tileX + dir.x, tileY + dir.y));
      if (!choices.length) {
        ghost.dir = { x: 0, y: 0 };
        return;
      }

      const target = getGhostTarget(ghost);
      choices.sort((a, b) => {
        const da = Math.hypot((tileX + a.x + 0.5) - target.x, (tileY + a.y + 0.5) - target.y);
        const db = Math.hypot((tileX + b.x + 0.5) - target.x, (tileY + b.y + 0.5) - target.y);
        return da - db;
      });

      if (state.powerTimer > 0) choices.reverse();

      ghost.dir = choices[0];
      ghost.lastDecisionTile = currentTile;
      ghost.targetX = tileX + ghost.dir.x + 0.5;
      ghost.targetY = tileY + ghost.dir.y + 0.5;
    }

    function getGhostTarget(ghost) {
      const baseTarget = { x: state.player.x, y: state.player.y };

      if (state.powerTimer > 0) {
        return {
          x: ghost.x + (ghost.x - baseTarget.x),
          y: ghost.y + (ghost.y - baseTarget.y)
        };
      }

      if (ghost.personality === 'ambusher') {
        const facing = state.player.facing || { x: 1, y: 0 };
        return {
          x: state.player.x + facing.x * 2,
          y: state.player.y + facing.y * 2
        };
      }

      if (ghost.personality === 'patroller') {
        const near = dist(ghost, state.player) < 3.5;
        return near ? baseTarget : { x: 1.5, y: 1.5 };
      }

      return baseTarget;
    }

    function updateGhosts(dt) {
      if (!state.gameStarted) return;
      for (const ghost of state.ghosts) {
        if (ghost.respawnTimer > 0) {
          ghost.respawnTimer = Math.max(0, ghost.respawnTimer - dt);
          if (ghost.respawnTimer === 0) {
            ghost.x = ghost.spawn.x + 0.5;
            ghost.y = ghost.spawn.y + 0.5;
            ghost.dir = { x: 0, y: 0 };
            ghost.nextDir = { x: 0, y: 0 };
            ghost.lastDecisionTile = null;
            ghost.targetX = null;
            ghost.targetY = null;
          }
          continue;
        }
        if (ghost.targetX === null || ghost.targetY === null) {
          chooseGhostDirection(ghost);
        }
        if (ghost.targetX === null || ghost.targetY === null) continue;

        const step = ghost.speed * dt;
        const dx = ghost.targetX - ghost.x;
        const dy = ghost.targetY - ghost.y;
        const distance = Math.hypot(dx, dy);

        if (distance <= step) {
          ghost.x = ghost.targetX;
          ghost.y = ghost.targetY;
          ghost.targetX = null;
          ghost.targetY = null;
        } else {
          ghost.x += (dx / distance) * step;
          ghost.y += (dy / distance) * step;
        }
      }
    }

    function shootFireball() {
      if (!state || state.over || state.won) return;
      if (state.paused || !state.started) return;
      if (state.fireballCooldown > 0) return;
      const facing = state.player.facing || { x: 1, y: 0 };
      if (!facing.x && !facing.y) return;
      sounds.fire();
      state.fireballs.push({
        x: state.player.x,
        y: state.player.y,
        dir: { ...facing },
        life: 0.55,
        speed: 10
      });
      state.fireballCooldown = 0.35;
    }

    function resetGhost(ghost, hidden = false) {
      ghost.x = ghost.spawn.x + 0.5;
      ghost.y = ghost.spawn.y + 0.5;
      ghost.dir = { x: 0, y: 0 };
      ghost.nextDir = { x: 0, y: 0 };
      ghost.lastDecisionTile = null;
      ghost.targetX = null;
      ghost.targetY = null;
      ghost.respawnTimer = hidden ? 1.2 : 0;
    }

    function updateFireballs(dt) {
      const next = [];
      for (const fireball of state.fireballs) {
        fireball.life -= dt;
        if (fireball.life <= 0) continue;
        const nx = fireball.x + fireball.dir.x * fireball.speed * dt;
        const ny = fireball.y + fireball.dir.y * fireball.speed * dt;
        if (!canOccupy(nx, ny, 0.08)) continue;
        fireball.x = nx;
        fireball.y = ny;

        let hit = false;
        for (const ghost of state.ghosts) {
          if (ghost.respawnTimer > 0) continue;
          if (dist(fireball, ghost) < 0.55) {
            resetGhost(ghost, true);
            state.score += 150;
            sounds.hitGhost();
            spawnBurst(ghost.x, ghost.y, '#ff8c32', 12, 3.8);
            state.flashTimer = 0.1;
            hit = true;
            break;
          }
        }
        if (!hit) next.push(fireball);
      }
      state.fireballs = next;
    }

    function handleCollisions() {
      for (const ghost of state.ghosts) {
        if (ghost.respawnTimer > 0) continue;
        if (dist(ghost, state.player) < 0.72) {
          if (state.powerTimer > 0) {
            resetGhost(ghost, true);
            state.score += 200;
            sounds.hitGhost();
            spawnBurst(ghost.x, ghost.y, '#7aa8ff', 12, 3.6);
          } else {
            loseLife();
            return;
          }
        }
      }
    }

    function loseLife() {
      stopMusic();
      sounds.hurt();
      state.lives -= 1;
      state.player = createEntity(state.playerSpawn.x, state.playerSpawn.y, 5.2);
      state.player.dir = { x: 0, y: 0 };
      state.player.nextDir = { x: 0, y: 0 };
      state.player.facing = { x: 1, y: 0 };
      state.player.targetX = null;
      state.player.targetY = null;
      state.fireballs = [];
      state.fireballCooldown = 0;
      state.particles = [];
      state.flashTimer = 0.2;
      state.ghosts.forEach((ghost) => {
        resetGhost(ghost, false);
      });
      state.powerTimer = 0;
      if (state.lives <= 0) state.over = true;
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      livesEl.textContent = state.lives;
      pelletsEl.textContent = state.pellets.size + state.orbs.size;
      powerEl.textContent = `${Math.max(0, state.powerTimer).toFixed(1)}से`;
      if (!state.started) statusEl.textContent = '';
      else if (state.paused) statusEl.textContent = 'थांबले आहे — P दाबा';
      else if (state.over) statusEl.textContent = 'खेळ संपला — R दाबा';
      else if (state.won) statusEl.textContent = 'तुम्ही जिंकलात — R दाबा';
      else statusEl.textContent = 'भुतांपासून सावध';
    }

    function updateMobileNote() {
      if (!mobileNoteEl) return;
      mobileNoteEl.textContent = isMobileLike
        ? 'मोबाइलवर: स्वाइप = दिशा, डबल टॅप = आगगोळा.'
        : '';
    }

    function handleMobileTap(x, y) {
      const now = performance.now();
      const isDoubleTap = lastTapPos
        && now - lastTapAt < 320
        && Math.hypot(x - lastTapPos.x, y - lastTapPos.y) < 30;

      lastTapAt = now;
      lastTapPos = { x, y };

      if (isDoubleTap) {
        shootFireball();
        lastTapAt = 0;
        lastTapPos = null;
      }
    }

    function handleSwipe(dx, dy) {
      if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? dirs.right : dirs.left);
      } else {
        setDirection(dy > 0 ? dirs.down : dirs.up);
      }
    }

    function togglePause() {
      if (!state || !state.started || state.over || state.won) return;
      state.paused = !state.paused;
      if (state.paused) {
        stopMusic();
      } else {
        startMusic();
      }
      updateHud();
    }

    function updateParticles(dt) {
      const next = [];
      for (const p of state.particles) {
        p.life -= dt;
        if (p.life <= 0) continue;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.98;
        p.vy *= 0.98;
        next.push(p);
      }
      state.particles = next;
    }

    function drawCircle(x, y, radius, color) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (state.flashTimer > 0) {
        ctx.fillStyle = `rgba(255,255,255,${Math.min(0.12, state.flashTimer)})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      for (let y = 0; y < state.tiles.length; y++) {
        for (let x = 0; x < state.tiles[y].length; x++) {
          const px = x * TILE;
          const py = y * TILE;
          if (state.tiles[y][x] === '#') {
            ctx.fillStyle = '#15339b';
            ctx.fillRect(px, py, TILE, TILE);
            ctx.strokeStyle = '#6d92ff';
            ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);
          }
        }
      }

      for (const pellet of state.pellets) {
        const [x, y] = pellet.split(',').map(Number);
        drawCircle(x * TILE + TILE / 2, y * TILE + TILE / 2, 3, '#f5f1c8');
      }
      for (const orb of state.orbs) {
        const [x, y] = orb.split(',').map(Number);
        ctx.shadowColor = '#fff6a5';
        ctx.shadowBlur = 14;
        drawCircle(x * TILE + TILE / 2, y * TILE + TILE / 2, 7, '#fff6a5');
        ctx.shadowBlur = 0;
      }
      for (const fireball of state.fireballs) {
        ctx.shadowColor = '#ff8c32';
        ctx.shadowBlur = 18;
        drawCircle(fireball.x * TILE, fireball.y * TILE, 5, '#ff8c32');
        ctx.shadowBlur = 0;
      }

      for (const p of state.particles) {
        ctx.globalAlpha = Math.max(0, p.life * 1.8);
        drawCircle(p.x * TILE, p.y * TILE, p.size, p.color);
        ctx.globalAlpha = 1;
      }

      for (const ghost of state.ghosts) {
        if (ghost.respawnTimer > 0) continue;
        const scared = state.powerTimer > 0;
        const color = scared ? '#7aa8ff' : ghost.color;
        const x = ghost.x * TILE;
        const y = ghost.y * TILE;
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = scared ? 18 : 10;
        ctx.beginPath();
        ctx.arc(x, y - 4, 10, Math.PI, 0);
        ctx.lineTo(x + 10, y + 9);
        ctx.lineTo(x + 4, y + 5);
        ctx.lineTo(x, y + 9);
        ctx.lineTo(x - 4, y + 5);
        ctx.lineTo(x - 10, y + 9);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        drawCircle(x - 4, y - 3, 2, '#fff');
        drawCircle(x + 4, y - 3, 2, '#fff');
      }

      const px = state.player.x * TILE;
      const py = state.player.y * TILE;
      const facing = state.player.facing || { x: 1, y: 0 };
      const baseAngle =
        facing.x > 0 ? 0 :
        facing.x < 0 ? Math.PI :
        facing.y > 0 ? Math.PI / 2 :
        -Math.PI / 2;
      const mouth = 0.22 + 0.16 * Math.abs(Math.sin(state.animTime * 14));
      ctx.fillStyle = '#ffd84d';
      ctx.shadowColor = '#ffd84d';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.arc(px, py, 11, baseAngle + mouth, baseAngle + Math.PI * 2 - mouth);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;

      if (state.over || state.won) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, canvas.height / 2 - 40, canvas.width, 80);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 26px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(state.over ? 'खेळ संपला' : 'पातळी पूर्ण!', canvas.width / 2, canvas.height / 2 + 8);
      } else if (!state.started || state.paused) {
        if (!state.started && startArt.complete) {
          ctx.save();
          ctx.globalAlpha = 0.92;
          ctx.drawImage(startArt, 0, 0, canvas.width, canvas.height);
          ctx.restore();
        }
        ctx.fillStyle = 'rgba(3, 8, 20, 0.62)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = 'center';
        if (!state.started) {
          ctx.fillStyle = '#c7f6ff';
          ctx.shadowColor = '#53ebff';
          ctx.shadowBlur = 20;
          ctx.font = isMobileLike ? 'bold 34px Inter, sans-serif' : 'bold 42px Inter, sans-serif';
          ctx.fillText('भुताटकी', canvas.width / 2, isMobileLike ? 92 : 110);
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 28px Inter, sans-serif';
          ctx.fillText('थांबले आहे', canvas.width / 2, canvas.height / 2 - 10);
          ctx.font = '16px Inter, sans-serif';
          ctx.fillStyle = '#cfe0ff';
          ctx.fillText('पुन्हा सुरू करण्यासाठी P दाबा', canvas.width / 2, canvas.height / 2 + 24);
        }
      }
    }

    function update(dt) {
      if (state.over || state.won || state.paused) {
        updateHud();
        return;
      }
      state.animTime += dt;
      if (state.powerTimer > 0) state.powerTimer = Math.max(0, state.powerTimer - dt);
      if (state.fireballCooldown > 0) state.fireballCooldown = Math.max(0, state.fireballCooldown - dt);
      if (state.flashTimer > 0) state.flashTimer = Math.max(0, state.flashTimer - dt);
      updatePlayer(dt);
      handleCollisions();
      updateGhosts(dt);
      updateFireballs(dt);
      updateParticles(dt);
      handleCollisions();
      updateHud();
    }

    function loop(ts) {
      const dt = Math.min(0.033, (ts - lastTime) / 1000 || 0);
      lastTime = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    function setDirection(dir) {
      if (!state || state.over || state.won || state.paused) return;
      state.player.nextDir = { ...dir };
      state.player.facing = { ...dir };
      if (state.player.targetX === null || state.player.targetY === null) {
        tryStartPlayerMove(dir);
      }
      state.gameStarted = true;
    }

    function handleKeydown(e) {
      const key = (e.key || '').toLowerCase();
      const code = e.code || '';
      const controlKeys = ['arrowleft', 'arrowright', 'arrowup', 'arrowdown', 'a', 'd', 'w', 's', ' ', 'spacebar', 'r', 'p'];
      const controlCodes = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'KeyA', 'KeyD', 'KeyW', 'KeyS', 'Space', 'KeyR', 'KeyP'];
      if (controlKeys.includes(key) || controlCodes.includes(code)) e.preventDefault();

      if (key === 'arrowleft' || key === 'a' || code === 'ArrowLeft' || code === 'KeyA') setDirection(dirs.left);
      if (key === 'arrowright' || key === 'd' || code === 'ArrowRight' || code === 'KeyD') setDirection(dirs.right);
      if (key === 'arrowup' || key === 'w' || code === 'ArrowUp' || code === 'KeyW') setDirection(dirs.up);
      if (key === 'arrowdown' || key === 's' || code === 'ArrowDown' || code === 'KeyS') setDirection(dirs.down);
      if (key === ' ' || key === 'spacebar' || code === 'Space') shootFireball();
      if (key === 'r' || code === 'KeyR') resetGame();
      if (key === 'p' || code === 'KeyP') togglePause();
    }

    function handleControlPress(target) {
      const dir = target.dataset.dir;
      const action = target.dataset.action;
      if (dir && dirs[dir]) setDirection(dirs[dir]);
      if (action === 'pause') togglePause();
    }

    window.addEventListener('keydown', handleKeydown, { passive: false });
    document.addEventListener('keydown', handleKeydown, { passive: false });
    document.body.tabIndex = 0;
    document.body.addEventListener('click', () => { ensureAudio(); document.body.focus(); });
    canvas.addEventListener('click', () => { ensureAudio(); canvas.focus(); });
    canvas.addEventListener('touchstart', (e) => {
      ensureAudio();
      if (!e.touches.length) return;
      const t = e.touches[0];
      const now = Date.now();
      const isDoubleTap = lastTapPos
        && now - lastTapAt < 360
        && Math.hypot(t.clientX - lastTapPos.x, t.clientY - lastTapPos.y) < 32;

      lastTapAt = now;
      lastTapPos = { x: t.clientX, y: t.clientY };

      if (isDoubleTap) {
        e.preventDefault();
        touchStart = null;
        shootFireball();
        lastTapAt = 0;
        lastTapPos = null;
        return;
      }

      touchStart = { x: t.clientX, y: t.clientY };
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      if (!touchStart || !e.changedTouches.length) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      e.preventDefault();
      if (Math.abs(dx) >= 24 || Math.abs(dy) >= 24) {
        handleSwipe(dx, dy);
      }
      touchStart = null;
    }, { passive: false });
    canvas.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'touch') return;
      touchStart = { x: e.clientX, y: e.clientY };
    });
    canvas.addEventListener('pointerup', (e) => {
      if (!touchStart) return;
      handleSwipe(e.clientX - touchStart.x, e.clientY - touchStart.y);
      touchStart = null;
    });
    document.querySelectorAll('.ctrl-btn').forEach((btn) => {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleControlPress(btn);
      });
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        handleControlPress(btn);
      });
    });
    window.addEventListener('load', () => {
      document.body.focus();
      canvas.focus();
      updateMobileNote();
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
